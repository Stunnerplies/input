<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Quick Calculator</title>
    <style>
        body { font-family: 'Arial', sans-serif; display: flex; justify-content: center; padding-top: 100px; background: #2c3e50; color: white; }
        .calc-card { background: #34495e; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; width: 300px; }
        input { width: 90%; padding: 12px; margin-bottom: 20px; border: none; border-radius: 5px; font-size: 18px; text-align: center; }
        button { width: 100%; padding: 12px; background: #27ae60; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; }
        button:hover { background: #2ecc71; }
        #output { margin-top: 25px; font-size: 28px; font-weight: bold; color: #f1c40f; word-wrap: break-word; }
        .label { font-size: 12px; color: #bdc3c7; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>

<div class="calc-card">
    <h2>Calculator</h2>
    <span class="label">Enter math (e.g., 23 + 23)</span>
    <input type="text" id="mathInput" placeholder="0">
    <button onclick="calculate()">Calculate Result</button>
    
    <div id="output">0</div>
</div>

<script>
    function calculate() {
        const inputField = document.getElementById('mathInput');
        const display = document.getElementById('output');
        
        try {
            // eval() takes the text and runs it as a math equation
            const result = eval(inputField.value);
            
            if (result === undefined || isNaN(result)) {
                display.innerText = "Error";
            } else {
                display.innerText = result;
            }
        } catch (error) {
            // If the user types something that isn't math (like "hello")
            display.innerText = "Invalid Math";
        }
    }
</script>

</body>
</html>
