<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Burp Response Lab</title>
    <style>
        body { font-family: sans-serif; background: #121212; color: white; text-align: center; padding-top: 50px; }
        .box { border: 2px solid #333; display: inline-block; padding: 20px; border-radius: 10px; }
        input { padding: 10px; font-size: 18px; margin-bottom: 10px; }
        button { padding: 10px 20px; background: #007bff; color: white; border: none; cursor: pointer; }
        #loader { display: none; color: yellow; margin: 10px; }
        #result { font-size: 30px; color: #00ff00; margin-top: 20px; }
    </style>
</head>
<body>

<div class="box">
    <h2>Figure Lab</h2>
    <input type="number" id="figure" value="500">
    <br>
    <button onclick="runLab()">Submit</button>
    <div id="loader">Processing in Burp...</div>
    <div id="result"></div>
</div>

<script>
    async function runLab() {
        const inputVal = document.getElementById('figure').value;
        const resultDiv = document.getElementById('result');
        const loader = document.getElementById('loader');

        resultDiv.innerText = "";
        loader.style.display = "block";

        try {
            // We send the data to a real "echo" service. 
            // This service simply sends back whatever you send it.
            const response = await fetch('https://httpbin.org/post', {
                method: 'POST',
                body: new URLSearchParams({ 'amount': inputVal })
            });
            
            const data = await response.json();
            
            // This is the key: We show the "amount" that comes BACK from the server
            // If you change it in Burp to 700, the server receives 700 and sends back 700.
            resultDiv.innerText = "Server Returned: " + data.form.amount;
        } catch (e) {
            resultDiv.innerText = "Error: Use Burp to Forward";
        } finally {
            loader.style.display = "none";
        }
    }
</script>

</body>
</html>
