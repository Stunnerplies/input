<!DOCTYPE html>
<html>
<head>
    <title>Burp Suite Lab - PHP</title>
    <style>
        body { font-family: 'Courier New', monospace; background: #1a1a1a; color: #00ff00; text-align: center; padding: 50px; }
        .container { border: 2px solid #00ff00; display: inline-block; padding: 30px; border-radius: 10px; }
        input { padding: 10px; background: #000; border: 1px solid #00ff00; color: #00ff00; margin-bottom: 10px; width: 250px; }
        button { padding: 10px 20px; background: #00ff00; color: #000; border: none; cursor: pointer; font-weight: bold; }
        #loader { display: none; margin-top: 20px; color: #ff00ff; }
        #result { margin-top: 20px; font-size: 24px; color: #fff; }
    </style>
</head>
<body>

<div class="container">
    <h2>SYSTEM CALCULATOR</h2>
    <input type="text" id="calcInput" placeholder="Enter calculation (e.g. 23+23)">
    <br>
    <button onclick="submitData()">PROCESS REQUEST</button>
    
    <div id="loader">POLLING SERVER...</div>
    <div id="result"></div>
</div>

<script>
    function submitData() {
        const val = document.getElementById('calcInput').value;
        const loader = document.getElementById('loader');
        const resultDiv = document.getElementById('result');

        loader.style.display = "block";
        resultDiv.innerText = "";

        // Send data to the PHP backend
        fetch('process.php', {
            method: 'POST',
            headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
            body: 'query=' + encodeURIComponent(val)
        })
        .then(response => response.text())
        .then(data => {
            // Artificial delay so you can see the "Loading" state in the UI
            setTimeout(() => {
                loader.style.display = "none";
                resultDiv.innerText = "Response: " + data;
            }, 1000);
        });
    }
</script>

</body>
</html>
