<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vulnerable Calc Lab</title>
    <style>
        body { font-family: monospace; background: #111; color: #0f0; display: flex; justify-content: center; padding-top: 50px; }
        .box { border: 1px solid #0f0; padding: 20px; width: 400px; box-shadow: 0 0 15px #0f0; }
        input { background: #000; border: 1px solid #0f0; color: #0f0; width: 100%; padding: 10px; box-sizing: border-box; margin-bottom: 10px; }
        button { background: #0f0; color: #000; border: none; padding: 10px; width: 100%; cursor: pointer; font-weight: bold; }
        #status { margin-top: 15px; color: #ff0; }
        #result { margin-top: 10px; font-size: 1.5rem; }
    </style>
</head>
<body>

<div class="box">
    <h2>TRANSACTION PROCESSOR</h2>
    <input type="text" id="dataInput" placeholder="Enter payload...">
    <button onclick="sendToServer()">SUBMIT TO SERVER</button>
    
    <div id="status"></div>
    <div id="result"></div>
</div>

<script>
    function sendToServer() {
        const val = document.getElementById('dataInput').value;
        const status = document.getElementById('status');
        const resultDiv = document.getElementById('result');

        status.innerText = "SENDING TO SERVER...";
        resultDiv.innerText = "";

        // We use fetch to a fake endpoint so Burp Suite can intercept the request
        fetch('/api/calculate', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ expression: val })
        })
        .then(response => response.json())
        .catch(() => {
            // Because there is no real backend, this will technically "fail"
            // But we simulate the "loading" and "result" anyway for the lab
            setTimeout(() => {
                status.innerText = "SERVER RESPONDED:";
                try {
                    resultDiv.innerText = eval(val); // The "vulnerability"
                } catch(e) {
                    resultDiv.innerText = "EXECUTION ERROR";
                }
            }, 2000);
        });
    }
</script>

</body>
</html>
